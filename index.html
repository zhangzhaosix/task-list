<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>每日任务清单</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #2d3436;
    min-height: 100vh;
    padding: 32px 16px;
    line-height: 1.7;
    letter-spacing: 0.3px;
    position: relative;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(255, 200, 100, 0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, rgba(255, 140, 170, 0.3) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 85%, rgba(160, 220, 180, 0.25) 0%, transparent 45%),
      radial-gradient(ellipse at 80% 55%, rgba(255, 210, 160, 0.2) 0%, transparent 40%),
      radial-gradient(ellipse at 20% 65%, rgba(200, 160, 255, 0.15) 0%, transparent 40%),
      linear-gradient(135deg, #fef9f0 0%, #fdf2f8 50%, #f0fdf4 100%);
  }

  /* ===== Background Light Spots ===== */
  .bg-spot {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
  }

  /* ===== Container (Glassmorphism) ===== */
  .container {
    max-width: 960px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 36px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.35);
    position: relative;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 6px;
  }
  header h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #2d3436, #636e72);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header h1 .icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    border-radius: 10px;
    margin-right: 8px;
    vertical-align: middle;
    position: relative;
    box-shadow: 0 4px 12px rgba(245, 176, 65, 0.3);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
    animation: iconPulse 3s ease-in-out infinite;
  }
  header h1 .icon-wrap:hover {
    transform: scale(1.08) rotate(-3deg);
    box-shadow: 0 6px 20px rgba(245, 176, 65, 0.45);
  }
  header h1 .icon-wrap svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
  }
  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(245, 176, 65, 0.3); }
    50% { box-shadow: 0 4px 20px rgba(245, 176, 65, 0.5), 0 0 30px rgba(245, 176, 65, 0.15); }
  }
  #dateDisplay {
    color: rgba(0, 0, 0, 0.35);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* ===== Glass Card Base ===== */
  .glass-card {
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 20px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .glass-card:hover {
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
  }

  /* ===== Progress Bar ===== */
  .progress-wrap {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.06);
  }
  .progress-bar .fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    background: linear-gradient(90deg, #f5b041, #ff9a76);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-bar .fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .progress-text {
    font-size: 14px;
    font-weight: 700;
    color: rgba(0, 0, 0, 0.35);
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  /* ===== Add Section ===== */
  .add-section {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .add-section .input-group {
    flex: 1;
    display: flex;
    background: rgba(255, 255, 255, 0.35);
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    min-width: 200px;
    backdrop-filter: blur(4px);
  }
  .add-section .input-group:focus-within {
    border-color: #f5b041;
    background: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.12);
  }
  .add-section .input-group input {
    flex: 1;
    padding: 14px 18px;
    border: none;
    border-radius: 14px 0 0 14px;
    font-size: 15px;
    outline: none;
    background: transparent;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .add-section .input-group input::placeholder {
    color: rgba(0, 0, 0, 0.25);
  }
  .add-section .input-group #addBtn {
    padding: 14px 24px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .add-section .input-group #addBtn:hover {
    opacity: 0.92;
    transform: scale(1.02);
  }
  .add-section .input-group #addBtn:active {
    transform: scale(0.97);
  }

  .add-section .type-selector {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-self: center;
  }
  .add-section .type-btn {
    padding: 10px 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.2);
    color: rgba(0, 0, 0, 0.4);
    transition: all 0.25s;
    white-space: nowrap;
    font-family: inherit;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
  }
  .add-section .type-btn:hover {
    background: rgba(255, 255, 255, 0.35);
    color: rgba(0, 0, 0, 0.6);
    transform: translateY(-1px);
  }
  .add-section .type-btn.daily.active {
    border-color: #f5b041;
    color: #d68910;
    background: rgba(245, 176, 65, 0.15);
    box-shadow: 0 0 0 3px rgba(245, 176, 65, 0.1);
  }
  .add-section .type-btn.temp.active {
    border-color: #00b894;
    color: #00a381;
    background: rgba(0, 184, 148, 0.12);
    box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.1);
  }

  /* ===== Mindset Section ===== */
  .mindset-section {
    border-radius: 20px;
    padding: 20px 18px 16px;
    margin-bottom: 24px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    transition: background 0.3s;
  }
  .mindset-section:hover {
    background: rgba(255, 255, 255, 0.2);
  }
  .mindset-section .mindset-header {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #ff9a76;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mindset-section .mindset-header .count {
    background: rgba(255, 154, 118, 0.12);
    padding: 1px 10px;
    border-radius: 12px;
    font-size: 12px;
    color: #ff9a76;
    margin-left: auto;
  }
  .mindset-input-wrap {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .mindset-input-wrap input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    background: rgba(255, 255, 255, 0.3);
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    letter-spacing: 0.3px;
  }
  .mindset-input-wrap input:focus {
    border-color: #ff9a76;
    background: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 0 3px rgba(255, 154, 118, 0.1);
  }
  .mindset-input-wrap button {
    padding: 10px 18px;
    background: linear-gradient(135deg, #ff9a76, #f5b041);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    font-family: inherit;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .mindset-input-wrap button:hover { opacity: 0.92; transform: scale(1.02); }
  .mindset-input-wrap button:active { transform: scale(0.97); }

  .mindset-list {
    list-style: none;
  }
  .mindset-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(4px);
    border-radius: 12px;
    margin-bottom: 4px;
    transition: background 0.2s, transform 0.2s;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .mindset-item:hover {
    background: rgba(255, 255, 255, 0.35);
    transform: translateX(2px);
  }
  .mindset-item .mindset-num {
    font-size: 11px;
    font-weight: 700;
    color: #ff9a76;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    opacity: 0.7;
  }
  .mindset-item .mindset-text {
    flex: 1;
    font-size: 13.5px;
    line-height: 1.6;
    color: #636e72;
    word-break: break-word;
    cursor: pointer;
  }
  .mindset-item .mindset-text:hover {
    color: #ff9a76;
  }
  .mindset-item .mindset-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mindset-item:hover .mindset-actions { opacity: 1; }
  .mindset-item .mindset-actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 6px;
    color: rgba(0, 0, 0, 0.3);
    transition: all 0.15s;
    line-height: 1;
  }
  .mindset-item .mindset-actions button:hover { transform: scale(1.15); }
  .mindset-item .mindset-actions .move-up:hover,
  .mindset-item .mindset-actions .move-down:hover {
    background: rgba(255, 154, 118, 0.1);
    color: #ff9a76;
  }
  .mindset-item .mindset-actions .mindset-del:hover {
    color: #e17055;
    background: rgba(225, 112, 85, 0.1);
  }

  .mindset-empty {
    text-align: center;
    padding: 16px;
    color: rgba(0, 0, 0, 0.2);
    font-size: 13px;
    font-weight: 500;
  }

  /* ===== Pending Stack ===== */
  .pending-stack {
    margin-bottom: 32px;
  }
  .pending-col {
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: background 0.3s;
  }
  .pending-col:hover {
    background: rgba(255, 255, 255, 0.16);
  }
  .pending-col .col-header {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(0, 0, 0, 0.5);
  }
  .pending-col .col-header .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .pending-col .col-header .tag.daily-tag {
    background: rgba(245, 176, 65, 0.12);
    color: #d68910;
  }
  .pending-col .col-header .tag.temp-tag {
    background: rgba(0, 184, 148, 0.12);
    color: #00a381;
  }
  .pending-col .col-header .count {
    background: rgba(255, 255, 255, 0.3);
    padding: 1px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin-left: auto;
    color: rgba(0, 0, 0, 0.4);
  }

  .pending-col .task-list,
  .completed-section .task-list {
    margin-bottom: 0;
  }

  /* ===== Completed Section ===== */
  .completed-section {
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(0, 0, 0, 0.35);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count {
    background: rgba(255, 255, 255, 0.3);
    padding: 1px 10px;
    border-radius: 12px;
    font-size: 12px;
    color: rgba(0, 0, 0, 0.4);
    font-weight: 600;
  }

  /* ===== Task Grid ===== */
  .task-list {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    contain: layout style;
  }
  #completedList.task-list {
    grid-template-columns: repeat(2, 1fr);
  }

  /* ===== Task Item (Card) ===== */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px 10px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    flex-direction: column;
    height: 185px;
    overflow: hidden;
  }
  @keyframes taskIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .task-item:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.38);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    border-color: rgba(255, 255, 255, 0.35);
  }

  /* ===== Task Card — Three-Section Layout ===== */
  .task-sections {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    width: 100%;
  }
  .task-section {
    min-height: 0;
    overflow: hidden;
  }

  /* Section 1: Title (required) */
  .task-section-title {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex: 2.5;
  }
  .task-title-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }

  /* Section 2: Link (optional, always occupies space) */
  .task-section-link {
    flex: 1;
    display: flex;
    align-items: center;
  }
  .task-link-display {
    font-size: 11px;
    color: rgba(0, 0, 0, 0.25);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    display: block;
    letter-spacing: 0.2px;
  }
  .task-link-display a {
    color: #e17055;
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1.5px dashed rgba(225, 112, 85, 0.3);
    transition: border-color 0.2s;
  }
  .task-link-display a:hover {
    border-bottom-style: solid;
    border-color: #e17055;
  }
  .task-item.completed .task-link-display a {
    color: rgba(0, 0, 0, 0.2);
    text-decoration: line-through;
    pointer-events: none;
  }

  /* Section 3: Note (optional, always occupies space) */
  .task-section-note {
    flex: 1;
    display: flex;
    align-items: center;
  }
  .task-note-display {
    font-size: 12px;
    color: #636e72;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    display: block;
    letter-spacing: 0.2px;
  }

  /* ===== Section Dividers ===== */
  .task-divider {
    height: 1px;
    background: rgba(0, 0, 0, 0.05);
    flex-shrink: 0;
  }

  /* ===== Favicon ===== */
  .task-favicon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .task-favicon-img {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    object-fit: contain;
  }
  .task-favicon-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
  }

  /* ===== Custom Checkbox ===== */
  .task-item .check-wrap {
    position: relative;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task-item .check-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 2;
  }
  .task-item .check-wrap .check-box {
    position: absolute;
    inset: 0;
    border: 2px solid rgba(0, 0, 0, 0.15);
    border-radius: 7px;
    transition: all 0.25s;
    pointer-events: none;
    background: rgba(255, 255, 255, 0.3);
  }
  .task-item .check-wrap input[type="checkbox"]:hover + .check-box {
    border-color: #f5b041;
    background: rgba(245, 176, 65, 0.05);
  }
  .task-item .check-wrap input[type="checkbox"]:checked + .check-box {
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    border-color: #f5b041;
    transform: scale(1.05);
  }
  .task-item .check-wrap input[type="checkbox"]:checked + .check-box::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 7px;
    width: 5px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }

  /* ===== Task Text ===== */
  .task-item .task-text {
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    color: #2d3436;
    font-weight: 500;
    letter-spacing: 0.2px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .task-item:not(.completed) .task-text {
    cursor: pointer;
  }
  .task-item:not(.completed) .task-text:hover {
    color: #e17055;
  }
  .task-item.completed .task-text {
    text-decoration: line-through;
    color: rgba(0, 0, 0, 0.25);
  }

  /* ===== Task Meta Bottom ===== */
  .task-card-bottom {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    width: 100%;
    flex-shrink: 0;
    border-top: 1px solid rgba(0, 0, 0, 0.04);
    padding-top: 4px;
  }
  .task-item .task-time {
    font-size: 11px;
    color: rgba(0, 0, 0, 0.25);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ===== Inline Edit ===== */
  .inline-edit-input {
    width: 100%;
    padding: 8px 12px;
    border: 2px solid #f5b041;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: rgba(255, 255, 255, 0.6);
    box-shadow: 0 0 0 3px rgba(245, 176, 65, 0.1);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-y: auto;
    resize: none;
    min-height: 36px;
    max-height: 80px;
    box-sizing: border-box;
  }

  /* ===== Actions ===== */
  .task-item .actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .task-item:hover .actions {
    opacity: 1;
  }
  .task-item .actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    border-radius: 8px;
    color: rgba(0, 0, 0, 0.25);
    transition: all 0.15s;
    line-height: 1;
  }
  .task-item .actions button:hover { transform: scale(1.15); }
  .task-item .actions .edit-btn:hover {
    background: rgba(255, 154, 118, 0.1);
    color: #ff9a76;
  }
  .task-item .actions .delete-btn:hover {
    background: rgba(225, 112, 85, 0.1);
    color: #e17055;
  }

  /* ===== Drag Handle ===== */
  .drag-handle {
    cursor: grab;
    font-size: 14px;
    padding: 0;
    color: rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
    transition: color 0.15s;
    position: absolute;
    top: 6px;
    right: 8px;
  }
  .drag-handle:active { cursor: grabbing; }
  .task-item:hover .drag-handle { color: rgba(0, 0, 0, 0.3); }

  /* ===== Drag States ===== */
  .task-item.dragging,
  .mindset-item.dragging {
    opacity: 0.4;
    box-shadow: 0 0 0 2px #f5b041;
    transform: scale(0.95);
  }
  .task-item.drag-over,
  .mindset-item.drag-over {
    box-shadow: 0 0 0 2px #f5b041, 0 4px 12px rgba(245, 176, 65, 0.2);
    transform: translateY(-2px);
  }

  /* ===== Type Badge (completed) ===== */
  .type-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 5px;
    margin-right: 4px;
    font-weight: 700;
    letter-spacing: 0.2px;
    vertical-align: middle;
  }
  .badge-daily { background: rgba(245, 176, 65, 0.12); color: #d68910; }
  .badge-temp { background: rgba(0, 184, 148, 0.12); color: #00a381; }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 24px 12px;
    color: rgba(0, 0, 0, 0.2);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    grid-column: 1 / -1;
  }

  /* ===== Footer ===== */
  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding-top: 20px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
  }
  .footer-bar .total-info {
    font-size: 13px;
    color: rgba(0, 0, 0, 0.35);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .clear-btn {
    padding: 8px 20px;
    background: rgba(255, 255, 255, 0.2);
    border: 1.5px solid rgba(0, 0, 0, 0.08);
    border-radius: 12px;
    color: rgba(0, 0, 0, 0.35);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
  }
  .clear-btn:hover {
    border-color: #e17055;
    color: #e17055;
    background: rgba(225, 112, 85, 0.06);
    transform: translateY(-1px);
  }
  .footer-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .data-btn {
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.2);
    border: 1.5px solid rgba(0, 0, 0, 0.08);
    border-radius: 12px;
    color: rgba(0, 0, 0, 0.35);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
  }
  .data-btn:hover {
    border-color: #f5b041;
    color: #d68910;
    background: rgba(245, 176, 65, 0.06);
    transform: translateY(-1px);
  }
  .data-btn.logout-btn:hover {
    border-color: #e17055;
    color: #e17055;
    background: rgba(225, 112, 85, 0.06);
  }

  /* ===== Login Overlay ===== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(255, 200, 100, 0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 75%, rgba(255, 140, 170, 0.25) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(160, 220, 180, 0.2) 0%, transparent 40%),
      linear-gradient(135deg, #fef9f0 0%, #fdf2f8 50%, #f0fdf4 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }
  .login-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .login-card {
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 36px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.35);
    text-align: center;
  }
  .login-card h1 {
    font-size: 26px;
    margin-bottom: 4px;
    color: #2d3436;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .login-card p {
    color: rgba(0, 0, 0, 0.35);
    font-size: 14px;
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }
  .login-card input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 14px;
    font-size: 15px;
    margin-bottom: 12px;
    outline: none;
    background: rgba(255, 255, 255, 0.3);
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    box-sizing: border-box;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .login-card input:focus {
    border-color: #f5b041;
    background: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.08);
  }
  .login-card button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .login-card button:hover { opacity: 0.92; transform: scale(1.01); }
  .login-card button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .login-error {
    color: #e17055;
    font-size: 13px;
    margin-top: 10px;
    min-height: 20px;
  }
  .login-loading {
    margin-top: 12px;
    color: rgba(0, 0, 0, 0.35);
    font-size: 14px;
  }

  /* ===== Quick Login ===== */
  .quick-login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .quick-login-btn:hover { opacity: 0.92; transform: scale(1.01); }
  .link-btn {
    display: block;
    margin: 14px auto 0;
    background: none;
    border: none;
    color: rgba(0, 0, 0, 0.35);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px 8px;
    font-family: inherit;
  }
  .link-btn:hover { color: rgba(0, 0, 0, 0.5); }
  .saved-email {
    font-size: 14px;
    color: rgba(0, 0, 0, 0.35);
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    word-break: break-all;
  }
  .auth-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 600;
    margin: 0 auto 12px;
    box-shadow: 0 4px 16px rgba(245, 176, 65, 0.2);
  }
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: rgba(0, 0, 0, 0.25);
    margin-left: 8px;
    font-weight: 400;
  }

  /* ===== Long-term Planning ===== */
  .plan-section {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
  }
  .plan-section .plan-header {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(0, 0, 0, 0.35);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .plan-section textarea {
    width: 100%;
    padding: 16px 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.8;
    outline: none;
    resize: none;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.2);
    color: #636e72;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    min-height: 60px;
    letter-spacing: 0.3px;
  }
  .plan-section textarea:focus {
    border-color: #f5b041;
    background: rgba(255, 255, 255, 0.35);
    box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.08);
  }
  .plan-section textarea::placeholder {
    color: rgba(0, 0, 0, 0.2);
  }
  .plan-section .plan-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 12px;
  }
  .plan-section .plan-save-hint {
    color: rgba(0, 0, 0, 0.2);
  }
  .plan-section .plan-save-hint.saved {
    color: #00b894;
  }

  /* ===== Add Task Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: modalFadeIn 0.2s ease;
  }
  @keyframes modalFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-box {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 28px 24px 20px;
    width: 420px;
    max-width: 88vw;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.5);
    animation: modalSlideIn 0.25s ease;
  }

  .modal-header-simple {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: #2d3436;
    letter-spacing: 0.3px;
  }
  .modal-close-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: rgba(0, 0, 0, 0.2);
    padding: 4px 8px;
    border-radius: 8px;
    transition: all 0.15s;
    line-height: 1;
  }
  .modal-close-btn:hover {
    color: rgba(0, 0, 0, 0.5);
    background: rgba(0, 0, 0, 0.05);
  }

  .modal-field {
    margin-bottom: 16px;
  }
  .modal-field:last-of-type {
    margin-bottom: 0;
  }
  .modal-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(0, 0, 0, 0.55);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .modal-field-tip {
    font-weight: 400;
    font-size: 11px;
    color: rgba(0, 0, 0, 0.2);
    margin-left: 6px;
  }
  .required-hint {
    color: #e17055;
    font-weight: 600;
    font-size: 11px;
    margin-left: 4px;
  }
  .optional-hint {
    color: rgba(0, 0, 0, 0.2);
    font-weight: 400;
    font-size: 11px;
    margin-left: 4px;
  }

  .modal-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid rgba(0, 0, 0, 0.08);
    border-radius: 14px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: rgba(255, 255, 255, 0.5);
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    box-sizing: border-box;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .modal-input:focus {
    border-color: #f5b041;
    box-shadow: 0 0 0 4px rgba(245, 176, 65, 0.12);
    background: rgba(255, 255, 255, 0.9);
  }
  .modal-input.error {
    border-color: #e17055;
    box-shadow: 0 0 0 4px rgba(225, 112, 85, 0.1);
  }
  .modal-input::placeholder {
    color: rgba(0, 0, 0, 0.18);
  }
  .modal-textarea {
    resize: none;
    overflow-y: auto;
    min-height: 52px;
    max-height: 120px;
    line-height: 1.6;
    text-align: left;
    padding: 12px 16px;
  }

  .modal-footer-simple {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
  }

  .modal-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    line-height: 1;
  }
  .modal-btn-primary {
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    min-width: 100px;
  }
  .modal-btn-primary:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }
  .modal-btn-primary:active {
    transform: scale(0.97);
  }
  .modal-btn-secondary {
    background: rgba(0, 0, 0, 0.05);
    color: rgba(0, 0, 0, 0.45);
  }
  .modal-btn-secondary:hover {
    background: rgba(0, 0, 0, 0.09);
  }
  .modal-btn-ghost {
    background: transparent;
    color: rgba(0, 0, 0, 0.2);
    padding: 10px 10px;
  }
  .modal-btn-ghost:hover {
    color: rgba(0, 0, 0, 0.4);
  }

  @media (max-width: 480px) {
    .modal-box {
      padding: 20px 16px 16px;
    }
    .modal-title {
      font-size: 16px;
    }
    .modal-btn {
      padding: 9px 16px;
      font-size: 13px;
    }
  }

  /* ===== Responsive ===== */
  @media (max-width: 860px) {
    .task-list {
      grid-template-columns: repeat(2, 1fr);
    }
    #completedList.task-list {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 600px) {
    body { padding: 12px 8px; }
    .container { padding: 20px 16px; border-radius: 18px; }
    header h1 { font-size: 24px; }
    .add-section .input-group { min-width: 100%; }
    .add-section .type-selector { align-self: stretch; }
    .add-section .type-btn { flex: 1; text-align: center; }

    .task-list {
      grid-template-columns: 1fr;
    }
    #completedList.task-list {
      grid-template-columns: 1fr;
    }

    .task-item .actions { opacity: 1; }
    .mindset-section { padding: 14px 12px; }
    .mindset-item .mindset-actions { opacity: 1; }
    .drag-handle {
      position: static;
      margin-right: auto;
    }
  }
  /* ===== Celebration ===== */
  .celebration-overlay {
    position: fixed;
    inset: 0;
    z-index: 5000;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: modalFadeIn 0.3s ease;
  }
  .celebration-overlay.show {
    display: flex;
  }
  .celebration-box {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 36px 28px;
    width: 400px;
    max-width: 88vw;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.5);
    animation: celebrationSlideIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  @keyframes celebrationSlideIn {
    from { opacity: 0; transform: translateY(30px) scale(0.88); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .celebration-icon {
    font-size: 60px;
    margin-bottom: 10px;
    display: block;
    animation: celebrationBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
  }
  @keyframes celebrationBounce {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  .celebration-message {
    font-size: 19px;
    font-weight: 700;
    color: #2d3436;
    line-height: 1.7;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .celebration-sub {
    font-size: 14px;
    color: rgba(0, 0, 0, 0.35);
    margin-bottom: 24px;
    letter-spacing: 0.3px;
  }
  .celebration-btn {
    padding: 12px 36px;
    background: linear-gradient(135deg, #f5b041, #ff9a76);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 14px rgba(245, 176, 65, 0.3);
  }
  .celebration-btn:hover {
    opacity: 0.92;
    transform: scale(1.03) translateY(-1px);
    box-shadow: 0 6px 20px rgba(245, 176, 65, 0.4);
  }
  .celebration-btn:active {
    transform: scale(0.97);
  }
  .celebration-confetti {
    position: absolute;
    pointer-events: none;
    font-size: 22px;
    animation: confettiFall 1.8s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100px) rotate(540deg) scale(0.2); }
  }
</style>

<body>

<!-- Background Spots -->
<div class="bg-spot" style="width:420px;height:420px;top:-120px;left:-80px;background:radial-gradient(circle,rgba(255,200,100,0.35),transparent 70%);filter:blur(80px)"></div>
<div class="bg-spot" style="width:360px;height:360px;top:20%;right:-100px;background:radial-gradient(circle,rgba(255,140,170,0.3),transparent 70%);filter:blur(70px)"></div>
<div class="bg-spot" style="width:320px;height:320px;bottom:15%;left:5%;background:radial-gradient(circle,rgba(160,220,180,0.25),transparent 70%);filter:blur(90px)"></div>
<div class="bg-spot" style="width:280px;height:280px;bottom:40%;right:15%;background:radial-gradient(circle,rgba(200,160,255,0.15),transparent 70%);filter:blur(60px)"></div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="auth-avatar">📋</div>
    <h1>每日任务清单</h1>
    <p>登录后自动同步所有设备</p>
    <form id="loginForm" action="#" method="post">
      <input type="email" id="loginEmail" name="email" placeholder="邮箱" autocomplete="username" required>
      <input type="password" id="loginPassword" name="password" placeholder="密码" autocomplete="current-password" required>
      <button id="loginBtn" type="submit">登 录</button>
    </form>
    <div id="quickLoginArea" style="display:none">
      <div class="saved-email" id="savedEmailDisplay"></div>
      <button id="quickLoginBtn" class="quick-login-btn">🔑 一键登录</button>
      <button id="switchToFormBtn" class="link-btn">使用其他账号</button>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="login-loading" id="loginLoading" style="display:none">登录中…</div>
  </div>
</div>

<div class="container">
  <header>
    <h1><span class="icon-wrap"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span> 今日任务</h1>
    <span id="dateDisplay"></span>
  </header>

  <!-- Progress Bar -->
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText">0%</span>
  </div>

  <!-- Add -->
  <div class="add-section">
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="按 Enter 开始填写任务..." autofocus>
      <button id="addBtn">添加</button>
    </div>
    <div class="type-selector">
      <button class="type-btn daily active" data-type="daily">每日必做</button>
      <button class="type-btn temp" data-type="temporary">临时事件</button>

<script>
  // ===== Firebase Init =====
  firebase.initializeApp({
    apiKey: "AIzaSyAYWi3MnkAX2qPZ7ODTletzIQQo267Lbxc",
    authDomain: "task-list-73021.firebaseapp.com",
    projectId: "task-list-73021",
    storageBucket: "task-list-73021.firebasestorage.app",
    messagingSenderId: "463815411355",
    appId: "1:463815411355:web:810ff0410934041093a83e",
    measurementId: "G-RJKK4B5DDL"
  });
  const auth = firebase.auth();
  const db = firebase.firestore();
  db.settings({ merge: true });

  // ===== State =====
  let user = null;
  let unsubFirestore = null;
  let fromSnapshot = false;
  let tasks = [];
  let mindsets = [];
  let planText = null, planHint = null, planWordCount = null, planTimer = null;
  let pendingNoteForTask = null;

  // ===== UI Helpers =====
  function formatDate() {
    const d = new Date();
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const wd = weekdays[d.getDay()];
    return `${year} 年 ${month} 月 ${day} 日 星期${wd}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function isUrl(str) {
    return /^https?:\/\/[^\s]+$/.test(str.trim());
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
  }

  function getUrlPath(url, maxLen = 45) {
    try {
      const u = new URL(url);
      let path = u.pathname;
      if (path === '/') return '';
      if (path.endsWith('/')) path = path.slice(0, -1);
      if (path.length > maxLen) path = path.slice(0, maxLen - 3) + '...';
      return path;
    } catch { return ''; }
  }

  // ===== Firestore =====
  function getDocRef() {
    return db.collection('users').doc(user.uid);
  }

  async function saveToFirestore() {
    if (!user || fromSnapshot) return;
    try {
      await getDocRef().set({
        tasks: JSON.stringify(tasks),
        plan: planText ? planText.value : '',
        mindsets: JSON.stringify(mindsets),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (e) {
      console.error('Sync error:', e);
    }
  }

  function subscribeFirestore() {
    if (unsubFirestore) unsubFirestore();
    unsubFirestore = getDocRef().onSnapshot(doc => {
      fromSnapshot = true;
      var changed = false;
      if (doc.exists) {
        var d = doc.data();
        try {
          var newTasks = d.tasks ? JSON.parse(d.tasks) : [];
          if (JSON.stringify(newTasks) !== JSON.stringify(tasks)) {
            tasks = newTasks;
            changed = true;
          }
        } catch { tasks = []; changed = true; }
        try {
          var newMindsets = d.mindsets ? JSON.parse(d.mindsets) : [];
          if (JSON.stringify(newMindsets) !== JSON.stringify(mindsets)) {
            mindsets = newMindsets;
            changed = true;
          }
        } catch { mindsets = []; changed = true; }
        if (planText) {
          var newPlan = d.plan || '';
          if (newPlan !== planText.value) {
            planText.value = newPlan;
            changed = true;
          }
        }
      } else {
        if (tasks.length > 0 || mindsets.length > 0 || (planText && planText.value)) {
          tasks = [];
          mindsets = [];
          changed = true;
          migrateLocalData();
        }
      }
      if (changed) {
        render();
        if (typeof renderMindsets === 'function') renderMindsets();
        if (planText) { autoResize(planText); updatePlanWordCount(); }
      }
      fromSnapshot = false;
    }, err => {
      console.error('Firestore subscription error:', err);
      fromSnapshot = false;
    });
  }

  // ===== Local Data Migration =====
  async function migrateLocalData() {
    const localTasks = localStorage.getItem('daily_tasks');
    const localPlan = localStorage.getItem('daily_tasks_plan');
    const localMindsets = localStorage.getItem('daily_tasks_mindset');
    if (localTasks || localPlan || localMindsets) {
      try { if (localTasks) tasks = JSON.parse(localTasks); } catch {}
      try { if (localMindsets) mindsets = JSON.parse(localMindsets); } catch {}
      if (planText && localPlan) planText.value = localPlan;
      try {
        await getDocRef().set({
          tasks: JSON.stringify(tasks),
          plan: planText ? planText.value : '',
          mindsets: JSON.stringify(mindsets),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        localStorage.removeItem('daily_tasks');
        localStorage.removeItem('daily_tasks_plan');
        localStorage.removeItem('daily_tasks_mindset');
      } catch (e) {
        console.error('数据迁移写入失败:', e);
      }
    }
  }

  // ===== Task Operations =====
  let currentType = 'daily';

  function saveTasks() { saveToFirestore(); }

  function render() {
    const dailyList = document.getElementById('dailyList');
    const tempList = document.getElementById('tempList');
    const completedList = document.getElementById('completedList');
    const dailyCount = document.getElementById('dailyCount');
    const tempCount = document.getElementById('tempCount');
    const completedCount = document.getElementById('completedCount');
    const totalInfo = document.getElementById('totalInfo');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    const daily = tasks.filter(t => !t.done && t.type === 'daily');
    const temp = tasks.filter(t => !t.done && t.type === 'temporary');
    const completed = tasks.filter(t => t.done);
    const total = tasks.length;
    const done = completed.length;

    dailyCount.textContent = daily.length;
    tempCount.textContent = temp.length;
    completedCount.textContent = done;
    totalInfo.innerHTML = `共 ${total} 项任务 <span class="sync-badge">${user ? '✓ ' + user.email : ''}</span>`;

    const pct = total ? Math.round((done / total) * 100) : 0;
    progressFill.style.width = pct + '%';
    progressText.textContent = pct + '%';

    dailyList.innerHTML = daily.length === 0
      ? '<li class="empty-state">暂无每日必做</li>'
      : daily.map(t => renderItem(t)).join('');

    tempList.innerHTML = temp.length === 0
      ? '<li class="empty-state">暂无临时事件</li>'
      : temp.map(t => renderItem(t)).join('');

    completedList.innerHTML = completed.length === 0
      ? '<li class="empty-state">还没有已完成的任务</li>'
      : completed.map(t => renderItem(t)).join('');
  }

  function renderItem(task) {
    const checked = task.done ? 'checked' : '';
    const cls = task.done ? 'task-item completed' : 'task-item';
    const drg = task.done ? '' : ' draggable="true"';
    const btnHtml = task.done ? '' : '<button class="edit-btn" data-edit="' + task.id + '" title="编辑">✏️</button>';
    const badge = task.done
      ? '<span class="type-badge ' + (task.type === 'daily' ? 'badge-daily' : 'badge-temp') + '">' + (task.type === 'daily' ? '每日' : '临时') + '</span> '
      : '';
    const text = escapeHtml(task.text);
    const linkUrl = task.url || (isUrl(task.text) ? task.text : null);
    const domain = linkUrl ? getDomain(linkUrl) : '';
    const urlPath = linkUrl ? getUrlPath(linkUrl) : '';

    // Favicon for URL tasks
    let faviconHtml = '';
    if (linkUrl) {
      const domainFirst = domain.charAt(0).toUpperCase();
      faviconHtml = '<div class="task-favicon">'
        + '<img class="task-favicon-img" src="https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain) + '&sz=32" '
        + 'alt="" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<div class=task-favicon-placeholder>' + escapeHtml(domainFirst) + '</div>\'">'
        + '</div>';
    }

    const handle = task.done ? '' : '<span class="drag-handle">⠿</span>';
    const urlDisplay = linkUrl ? escapeHtml(domain + urlPath) : '';

    // Section 1: Title (always plain text)
    const titleHtml = '<span class="task-text">' + badge + text + '</span>';

    // Section 2: Link (or empty placeholder — always occupies space)
    const linkHtml = linkUrl
      ? '<span class="task-link-display">📎 <a href="' + escapeHtml(linkUrl) + '" target="_blank" rel="noopener noreferrer" title="' + escapeHtml(linkUrl) + '">' + urlDisplay + '</a></span>'
      : '<span class="task-link-display"></span>';

    // Section 3: Note (or empty placeholder — always occupies space)
    const noteHtml = task.note
      ? '<span class="task-note-display">💬 ' + escapeHtml(task.note) + '</span>'
      : '<span class="task-note-display"></span>';

    return '<li class="' + cls + '" data-id="' + task.id + '"' + drg + '>'
      + handle
      + '<div class="task-sections">'
        + '<div class="task-section task-section-title">'
          + '<label class="check-wrap">'
            + '<input type="checkbox" ' + checked + ' data-toggle="' + task.id + '">'
            + '<span class="check-box"></span>' +
          '</label>'
          + '<div class="task-title-wrap">'
            + faviconHtml
            + titleHtml
          + '</div>'
        + '</div>'
        + '<div class="task-divider"></div>'
        + '<div class="task-section task-section-link">'
          + linkHtml
        + '</div>'
        + '<div class="task-divider"></div>'
        + '<div class="task-section task-section-note">'
          + noteHtml
        + '</div>'
      + '</div>'
      + '<div class="task-card-bottom">'
        + '<span class="actions">'
          + btnHtml
          + '<button class="delete-btn" data-delete="' + task.id + '" title="删除">🗑️</button>'
        + '</span>'
      + '</div>'
    + '</li>';
  }

  async function fetchPageTitle(url) {
    const proxies = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
      'https://api.codetabs.com/v1/proxy?quest=',
      'https://cors-anywhere.herokuapp.com/'
    ];
    for (const proxy of proxies) {
      try {
        const res = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(5000) });
        const html = await res.text();
        const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
        if (m) return m[1].trim();
      } catch {}
    }
    return null;
  }

  // ===== Add / Edit Task Modal =====
  let modalEditId = null;

  function openAddModal() {
    modalEditId = null;
    var existingText = document.getElementById('taskInput').value.trim();
    document.getElementById('modalTitleLabel').textContent = '📝 添加新任务';
    document.getElementById('modalInput1').value = existingText;
    document.getElementById('modalInput2').value = '';
    document.getElementById('modalInput3').value = '';
    document.getElementById('modalInput1').classList.remove('error');
    document.getElementById('modalSubmit').textContent = '✅ 添加';
    document.getElementById('addTaskModal').style.display = 'flex';
    setTimeout(function() { document.getElementById('modalInput1').focus(); }, 120);
  }

  function openEditModal(id) {
    var task = tasks.find(function(t) { return t.id === id; });
    if (!task) return;
    modalEditId = id;
    document.getElementById('modalTitleLabel').textContent = '✏️ 编辑任务';
    document.getElementById('modalInput1').value = task.text;
    document.getElementById('modalInput2').value = task.url || '';
    document.getElementById('modalInput3').value = task.note || '';
    document.getElementById('modalInput1').classList.remove('error');
    document.getElementById('modalSubmit').textContent = '✅ 保存';
    document.getElementById('addTaskModal').style.display = 'flex';
    setTimeout(function() { document.getElementById('modalInput1').focus(); }, 120);
  }

  function closeAddModal() {
    document.getElementById('addTaskModal').style.display = 'none';
  }

  function submitModal() {
    var title = document.getElementById('modalInput1').value.trim();
    if (!title) {
      var inp = document.getElementById('modalInput1');
      inp.classList.add('error');
      inp.focus();
      return;
    }
    var url = document.getElementById('modalInput2').value.trim();
    var note = document.getElementById('modalInput3').value.trim();

    // 先关模态框，再更新 DOM（避免遮罩与重绘重叠）
    closeAddModal();

    if (modalEditId) {
      // 编辑模式
      var task = tasks.find(function(t) { return t.id === modalEditId; });
      if (task) {
        task.text = title;
        task.url = url || '';
        task.note = note || '';
        saveTasks();
        render();
      }
    } else {
      // 新建模式
      var task = {
        id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        text: title,
        type: currentType,
        done: false,
        url: url || '',
        note: note || '',
        createdAt: Date.now()
      };
      tasks.push(task);
      saveTasks();
      render();

      // 后台抓取标题
      if (url) {
        fetchPageTitle(url).then(function(t) {
          if (t) {
            task.text = t;
            saveTasks();
            render();
          }
        }).catch(function() {});

        document.getElementById('taskInput').value = '';
      }
      document.getElementById('taskInput').focus();
    }
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      const wasDone = task.done;
      task.done = !task.done;
      saveTasks();
      render();
      // 100% celebration: just completed a task AND all tasks are now done
      if (!wasDone && task.done && tasks.every(t => t.done)) {
        setTimeout(showCelebration, 350);
      }
    }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  // ===== Celebration =====
  const CELEBRATION_MESSAGES = [
    '🎉 太棒了！今日任务全部完成，给自己点个赞！',
    '🌟 今日任务圆满收官，你是最棒的！',
    '✨ 任务清零！好好休息，明天继续加油！',
    '🎊 恭喜完成今日所有任务，放松一下吧！',
    '💪 今日任务全部搞定，每天都更优秀一步！',
    '🏆 全任务达成！今天也是高效的一天！',
    '🌈 完美收工！去做点让自己开心的事吧！',
    '🎯 今日目标全部命中，太厉害了！',
    '⭐ 今日任务全亮绿灯，值得好好犒劳自己！',
    '🌸 今日事今日毕，你是执行力超强的人！',
    '🚀 任务全部完成！每天进步一点，积少成多！',
    '🎈 又完成了一天所有任务，坚持就是胜利！',
    '🌻 今日满分完成任务，带着成就感好好休息！',
    '🔥 今天是高效的一天！保持这个状态继续前进！',
    '🍀 任务全部画上勾，奖励自己一小段轻松时光！',
  ];

  function showCelebration() {
    const overlay = document.getElementById('celebrationOverlay');
    const msgEl = document.getElementById('celebrationMessage');
    const msg = CELEBRATION_MESSAGES[Math.floor(Math.random() * CELEBRATION_MESSAGES.length)];
    msgEl.textContent = msg;
    overlay.classList.add('show');
  }
  function hideCelebration() {
    document.getElementById('celebrationOverlay').classList.remove('show');
  }

  let dragSourceId = null;
  let mindsetDragSourceId = null;

  document.addEventListener('dragstart', function(e) {
    if (e.target.closest('.inline-edit-input')) {
      e.preventDefault();
      return;
    }

    const mindsetLi = e.target.closest('.mindset-item');
    if (mindsetLi) {
      mindsetDragSourceId = mindsetLi.dataset.mid;
      mindsetLi.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', mindsetLi.dataset.mid);
      return;
    }
    const taskLi = e.target.closest('.task-item:not(.completed)');
    if (!taskLi) { e.preventDefault(); return; }
    dragSourceId = taskLi.dataset.id;
    taskLi.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskLi.dataset.id);
  });

  document.addEventListener('dragend', function(e) {
    const li = e.target.closest('.task-item, .mindset-item');
    if (li) li.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragSourceId = null;
    mindsetDragSourceId = null;
  });

  document.addEventListener('dragover', function(e) {
    if (mindsetDragSourceId) {
      const li = e.target.closest('.mindset-item');
      if (!li || li.dataset.mid === mindsetDragSourceId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.mindset-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
      return;
    }
    if (dragSourceId) {
      const li = e.target.closest('.task-item:not(.completed)');
      if (!li || li.dataset.id === dragSourceId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.task-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      li.classList.add('drag-over');
    }
  });

  document.addEventListener('dragleave', function(e) {
    const li = e.target.closest('.task-item, .mindset-item');
    if (li) li.classList.remove('drag-over');
  });

  document.addEventListener('drop', function(e) {
    e.preventDefault();
    document.querySelectorAll('.drag-over, .dragging').forEach(el => el.classList.remove('drag-over', 'dragging'));

    if (mindsetDragSourceId) {
      const targetLi = e.target.closest('.mindset-item');
      if (!targetLi || targetLi.dataset.mid === mindsetDragSourceId) return;
      const fromIdx = mindsets.findIndex(m => m.id === mindsetDragSourceId);
      const toIdx = mindsets.findIndex(m => m.id === targetLi.dataset.mid);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = mindsets.splice(fromIdx, 1);
      const newTo = mindsets.findIndex(m => m.id === targetLi.dataset.mid);
      mindsets.splice(newTo < 0 ? toIdx : newTo, 0, moved);
      mindsetDragSourceId = null;
      saveMindsets();
      renderMindsets();
      return;
    }

    if (dragSourceId) {
      const targetLi = e.target.closest('.task-item:not(.completed)');
      if (!targetLi || targetLi.dataset.id === dragSourceId) return;
      const fromIdx = tasks.findIndex(t => t.id === dragSourceId);
      const toIdx = tasks.findIndex(t => t.id === targetLi.dataset.id);
      if (fromIdx === -1 || toIdx === -1) return;
      if (tasks[fromIdx].type !== tasks[toIdx].type) return;
      const [moved] = tasks.splice(fromIdx, 1);
      const newTo = tasks.findIndex(t => t.id === targetLi.dataset.id);
      tasks.splice(newTo < 0 ? toIdx : newTo, 0, moved);
      dragSourceId = null;
      saveTasks();
      render();
    }
  });

  let editingId = null;

  function startInlineEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task || task.done) return;
    if (editingId === id) return;
    if (editingId) finishInlineEdit(editingId, true);

    editingId = id;
    const li = document.querySelector('li[data-id="' + id + '"]');
    if (!li) { editingId = null; return; }

    const textSpan = li.querySelector('.task-text');
    if (!textSpan) { editingId = null; return; }

    const textarea = document.createElement('textarea');
    textarea.className = 'inline-edit-input';
    textarea.value = task.text;
    textarea.setAttribute('draggable', false);

    textSpan.replaceWith(textarea);

    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 80) + 'px';
    textarea.style.maxHeight = '80px';

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });

    textarea.focus();

    if (task.text.length <= 50) {
      textarea.select();
    } else {
      textarea.setSelectionRange(task.text.length, task.text.length);
    }
  }

  function finishInlineEdit(id, save) {
    if (editingId !== id) return;
    editingId = null;

    if (save) {
      const input = document.querySelector('li[data-id="' + id + '"] .inline-edit-input');
      if (input) {
        const newText = input.value.trim();
        const task = tasks.find(t => t.id === id);
        if (task && newText) {
          task.text = newText;
          saveTasks();
        }
      }
    }
    render();
  }

  function clearCompleted() {
    const completed = tasks.filter(t => t.done);
    if (completed.length === 0) return;

    const hasDaily = completed.some(t => t.type === 'daily');
    const msg = hasDaily
      ? '每日必做将重置为未完成，临时事件将被删除。确定继续吗？'
      : '确定清空所有已完成的任务吗？';

    if (!confirm(msg)) return;

    tasks = tasks.map(t => {
      if (t.done && t.type === 'daily') t.done = false;
      return t;
    }).filter(t => !(t.done && t.type === 'temporary'));

    saveTasks();
    render();
  }

  // ===== Event Delegation =====
  document.addEventListener('click', function(e) {
    if (typeof editingMindsetId !== 'undefined' && editingMindsetId && !e.target.closest('.inline-edit-input') && !e.target.closest('[data-mup],[data-mdown],[data-mdel]')) {
      finishMindsetEdit(editingMindsetId, true);
    }
    if (editingId && !e.target.closest('.inline-edit-input') && !e.target.closest('[data-edit]')) {
      finishInlineEdit(editingId, true);
    }


    const mup = e.target.closest('[data-mup]');
    if (mup) { moveMindsetUp(mup.dataset.mup); return; }
    const mdown = e.target.closest('[data-mdown]');
    if (mdown) { moveMindsetDown(mdown.dataset.mdown); return; }
    const mdel = e.target.closest('[data-mdel]');
    if (mdel) { deleteMindset(mdel.dataset.mdel); return; }
    const mtext = e.target.closest('.mindset-item .mindset-text');
    if (mtext) { startMindsetEdit(mtext.closest('.mindset-item').dataset.mid); return; }

    const toggle = e.target.closest('[data-toggle]');
    if (toggle) { toggleTask(toggle.dataset.toggle); return; }
    const del = e.target.closest('[data-delete]');
    if (del) { deleteTask(del.dataset.delete); return; }
    const edit = e.target.closest('[data-edit]');
    if (edit) { openEditModal(edit.dataset.edit); return; }
    const textSpan = e.target.closest('.task-item:not(.completed) .task-text');
    if (textSpan && !e.target.closest('a')) {
      startInlineEdit(textSpan.closest('.task-item').dataset.id);
    }
  });

  document.addEventListener('keydown', function(e) {
    if (typeof editingMindsetId !== 'undefined' && editingMindsetId) {
      if (e.key === 'Enter') { e.preventDefault(); finishMindsetEdit(editingMindsetId, true); return; }
      if (e.key === 'Escape') { e.preventDefault(); finishMindsetEdit(editingMindsetId, false); return; }
    }
    if (editingId) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finishInlineEdit(editingId, true); return; }
      if (e.key === 'Escape') { e.preventDefault(); finishInlineEdit(editingId, false); return; }
    }
  });

  // ===== Auth =====
  const overlay = document.getElementById('loginOverlay');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const loginLoading = document.getElementById('loginLoading');
  const quickLoginArea = document.getElementById('quickLoginArea');
  const loginFormArea = document.getElementById('loginForm');

  function showLogin() {
    const savedEmail = localStorage.getItem('tasklist_email');
    const savedPassword = localStorage.getItem('tasklist_password');
    if (savedEmail && savedPassword) {
      loginFormArea.style.display = 'none';
      quickLoginArea.style.display = 'block';
      document.getElementById('savedEmailDisplay').textContent = '📧 ' + savedEmail;
    } else {
      loginFormArea.style.display = 'block';
      quickLoginArea.style.display = 'none';
    }
    overlay.classList.remove('hidden');
  }

  function hideLogin() { overlay.classList.add('hidden'); }

  auth.onAuthStateChanged(u => {
    if (u) {
      user = u;
      hideLogin();
      planText = document.getElementById('planText');
      planHint = document.getElementById('planHint');
      planWordCount = document.getElementById('planWordCount');
      document.getElementById('dateDisplay').textContent = formatDate();
      subscribeFirestore();
      setupPlanListeners();
      setupTaskListeners();
    } else {
      user = null;
      if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
      showLogin();
    }
  });

  loginFormArea.addEventListener('submit', function(e) {
    e.preventDefault();
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    if (!email || !password) { loginError.textContent = '请输入邮箱和密码'; return; }
    loginLoading.style.display = 'block';
    loginError.textContent = '';
    loginBtn.disabled = true;
    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        localStorage.setItem('tasklist_email', email);
        localStorage.setItem('tasklist_password', password);
      })
      .catch(err => {
        loginError.textContent = err.message.includes('user-not-found') || err.message.includes('wrong-password') || err.message.includes('invalid-credential')
          ? '邮箱或密码错误'
          : err.message;
      })
      .finally(() => {
        loginLoading.style.display = 'none';
        loginBtn.disabled = false;
      });
  });

  document.getElementById('quickLoginBtn').addEventListener('click', function() {
    const email = localStorage.getItem('tasklist_email');
    const password = localStorage.getItem('tasklist_password');
    if (!email || !password) {
      localStorage.removeItem('tasklist_email');
      localStorage.removeItem('tasklist_password');
      showLogin();
      return;
    }
    loginLoading.style.display = 'block';
    loginError.textContent = '';
    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        localStorage.removeItem('tasklist_email');
        localStorage.removeItem('tasklist_password');
        showLogin();
        loginError.textContent = '登录已失效，请重新输入密码';
      })
      .finally(() => {
        loginLoading.style.display = 'none';
      });
  });

  document.getElementById('switchToFormBtn').addEventListener('click', function() {
    localStorage.removeItem('tasklist_email');
    localStorage.removeItem('tasklist_password');
    loginEmail.value = '';
    loginPassword.value = '';
    showLogin();
  });

  // ===== Plan =====
  function updatePlanWordCount() {
    if (!planText) return;
    const text = planText.value.trim();
    const count = text ? text.length : 0;
    planWordCount.textContent = count + ' 字';
  }

  function autoResize(el) {
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function setupPlanListeners() {
    if (!planText) return;
    planText.addEventListener('input', function() {
      autoResize(this);
      updatePlanWordCount();
      planHint.textContent = '自动保存';
      planHint.className = 'plan-save-hint';
      clearTimeout(planTimer);
      planTimer = setTimeout(() => saveToFirestore(), 500);
    });
    autoResize(planText);
    updatePlanWordCount();
  }

  function setupTaskListeners() {
    // 添加按钮 → 打开三步模态框
    document.getElementById('addBtn').addEventListener('click', openAddModal);
    document.getElementById('taskInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        openAddModal();
      }
    });

    // 模态框：提交 / 取消 / 关闭
    document.getElementById('modalSubmit').addEventListener('click', submitModal);
    document.getElementById('modalCancel').addEventListener('click', closeAddModal);
    document.getElementById('modalCloseBtn').addEventListener('click', closeAddModal);

    // 标题文本域：Enter 提交，Ctrl+Enter 换行
    document.getElementById('modalInput1').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (e.ctrlKey || e.metaKey) {
          // Ctrl+Enter → 换行
          var start = this.selectionStart;
          var end = this.selectionEnd;
          this.value = this.value.substring(0, start) + '\n' + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + 1;
        } else {
          // Enter → 提交
          e.preventDefault();
          submitModal();
        }
      }
    });
    document.getElementById('modalInput1').addEventListener('input', function() {
      this.classList.remove('error');
    });

    // 链接 / 备注：Enter 直接提交
    document.querySelectorAll('#modalInput2, #modalInput3').forEach(function(inp) {
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitModal();
        }
      });
    });

    // 点击遮罩关闭
    document.getElementById('addTaskModal').addEventListener('click', function(e) {
      if (e.target === this) closeAddModal();
    });

    // Escape 关闭
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var modal = document.getElementById('addTaskModal');
        if (modal.style.display === 'flex') closeAddModal();
      }
    });

    document.getElementById('clearBtn').addEventListener('click', clearCompleted);

    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentType = this.dataset.type;
      });
    });
  }

  // ===== Mindset =====
  function saveMindsets() { saveToFirestore(); }

  function renderMindsets() {
    const list = document.getElementById('mindsetList');
    const count = document.getElementById('mindsetCount');
    if (!list || !count) return;

    count.textContent = mindsets.length;

    if (mindsets.length === 0) {
      list.innerHTML = '<li class="mindset-empty">还没有记录，添加一条思维原则吧</li>';
      return;
    }

    list.innerHTML = mindsets.map((m, i) =>
      '<li class="mindset-item" draggable="true" data-mid="' + m.id + '">'
        + '<span class="drag-handle">⠿</span>'
        + '<span class="mindset-num">#' + (i + 1) + '</span>'
        + '<span class="mindset-text">' + escapeHtml(m.text) + '</span>'
        + '<span class="mindset-actions">'
          + (i > 0 ? '<button class="move-up" data-mup="' + m.id + '" title="上移">↑</button>' : '')
          + (i < mindsets.length - 1 ? '<button class="move-down" data-mdown="' + m.id + '" title="下移">↓</button>' : '')
          + '<button class="mindset-del" data-mdel="' + m.id + '" title="删除">✕</button>'
        + '</span>'
      + '</li>'
    ).join('');
  }

  function addMindset() {
    const input = document.getElementById('mindsetInput');
    const text = input.value.trim();
    if (!text) return;

    mindsets.push({
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      text: text,
      createdAt: Date.now()
    });

    saveMindsets();
    renderMindsets();
    input.value = '';
    input.focus();
  }

  function deleteMindset(id) {
    mindsets = mindsets.filter(m => m.id !== id);
    saveMindsets();
    renderMindsets();
  }

  let editingMindsetId = null;

  function startMindsetEdit(id) {
    const m = mindsets.find(m => m.id === id);
    if (!m) return;
    if (editingMindsetId === id) return;
    if (editingMindsetId) finishMindsetEdit(editingMindsetId, true);

    editingMindsetId = id;
    const li = document.querySelector('li[data-mid="' + id + '"]');
    if (!li) { editingMindsetId = null; return; }

    const textSpan = li.querySelector('.mindset-text');
    if (!textSpan) { editingMindsetId = null; return; }

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'inline-edit-input';
    input.value = m.text;
    input.maxLength = 200;

    textSpan.replaceWith(input);
    input.focus();
    input.select();
  }

  function finishMindsetEdit(id, save) {
    if (editingMindsetId !== id) return;
    editingMindsetId = null;

    if (save) {
      const input = document.querySelector('li[data-mid="' + id + '"] .inline-edit-input');
      if (input) {
        const newText = input.value.trim();
        const m = mindsets.find(x => x.id === id);
        if (m && newText) {
          m.text = newText;
          saveMindsets();
        }
      }
    }
    renderMindsets();
  }

  document.getElementById('mindsetAddBtn').addEventListener('click', addMindset);
  document.getElementById('mindsetInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addMindset();
  });

  function moveMindsetUp(id) {
    const idx = mindsets.findIndex(m => m.id === id);
    if (idx <= 0) return;
    [mindsets[idx - 1], mindsets[idx]] = [mindsets[idx], mindsets[idx - 1]];
    saveMindsets();
    renderMindsets();
  }

  function moveMindsetDown(id) {
    const idx = mindsets.findIndex(m => m.id === id);
    if (idx === -1 || idx >= mindsets.length - 1) return;
    [mindsets[idx], mindsets[idx + 1]] = [mindsets[idx + 1], mindsets[idx]];
    saveMindsets();
    renderMindsets();
  }

  // ===== Export / Import =====
  function exportData() {
    const data = {
      tasks: JSON.stringify(tasks),
      plan: planText ? planText.value : '',
      mindsets: JSON.stringify(mindsets)
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '每日任务清单_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (data.tasks) tasks = JSON.parse(data.tasks);
        if (data.mindsets) mindsets = JSON.parse(data.mindsets);
        if (planText && data.plan) planText.value = data.plan;
        render();
        if (typeof renderMindsets === 'function') renderMindsets();
        saveToFirestore().then(() => {
          alert('数据导入成功！已同步到云端。');
        });
      } catch {
        alert('导入失败：文件格式不正确');
      }
    };
    reader.readAsText(file);
  }

  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', function() {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', function(e) {
    if (e.target.files.length > 0) {
      importData(e.target.files[0]);
      e.target.value = '';
    }
  });

  // ===== Logout =====
  document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('确定要退出登录吗？退出后需要重新登录才能查看数据。')) {
      localStorage.removeItem('tasklist_email');
      localStorage.removeItem('tasklist_password');
      auth.signOut();
    }
  });
</script>

<!-- Celebration Overlay -->
<div class="celebration-overlay" id="celebrationOverlay" onclick="if(event.target===this)hideCelebration()">
  <div class="celebration-box">
    <span class="celebration-icon">🎉</span>
    <div class="celebration-message" id="celebrationMessage"></div>
    <div class="celebration-sub">今天也是高效的一天 ✨</div>
    <button class="celebration-btn" onclick="hideCelebration()">继续加油 💪</button>
  </div>
</div>

</body>
</html>
